<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css" type="text/css" media="all" />
</head>

<body>
    <header class="header">
        <div class="header-left">
            <img class="logo" src="./assets/images/logo-small.svg" alt="logo" />
            <div class="header-title">
                <h1>Typing Speed test</h1>
                <p class="subtitle">type as fast as you can in 60 seconds</p>
            </div>
        </div>
        <div class="header-right">
            <img class="pb-icon" src="./assets/images/icon-personal-best.svg" alt="Cup icon" />
            <p class="pb-label">Personal Best: <span class="highlight"><span class="personal-best"></span> WPM</span></p>
        </div>
    </header>

    <div class="controls">
        <div class="stats-row">
            <div class="stat-item">
                <p class="stat-label">WPM:</p>
                <span class="stat-value wpm">00</span>
            </div>
            <div class="stat-item">
                <p class="stat-label">Accuracy:</p>
                <span class="stat-value accuracy">0%</span>
            </div>
            <div class="stat-item">
                <p class="stat-label">Time:</p>
                <span class="stat-value time">0:00</span>
            </div>
        </div>

        <div class="options-group">
            <div class="option-group difficulty">
                <p class="option-label">Difficulty:</p>
                <input type="radio" name="difficulty" id="easy" value="easy" checked>
                <label for="easy">Easy</label>
                <input type="radio" name="difficulty" id="medium" value="medium">
                <label for="medium">Medium</label>
                <input type="radio" name="difficulty" id="hard" value="hard">
                <label for="hard">Hard</label>
            </div>
            <div class="option-group mode">
                <p class="option-label">Mode:</p>
                <input type="radio" name="mode" id="timed" value="timed" checked>
                <label for="timed">Timed(60s)</label>
                <input type="radio" name="mode" id="passage" value="passage">
                <label for="passage">Passage</label>
            </div>
        </div>
    </div>

    <hr class="divider">

    <div class="passage">
        <p></p>
        <hr class="divider">
        
        <div class="reset-wrapper">
            <button class="reset" type="button">Reset</button>
        </div>

        <div class="not-started">
            <button type="button" class="btn-start">Start Typing Test</button>
        </div>
    </div>

    <div class="results hidden">
        <div class="results-icon">
            <img src="assets/images/icon-completed.svg" alt="">
        </div>
        <h2 class="results-title">Test Completed</h2>
        <p class="results-subtitle">Solid run, Keep pushing to beat your high score.</p>
        <div class="results-stats">
            <div class="result-card">
                <p class="card-label">WPM</p>
                <p class="card-value wpm">50</p>
            </div>
            <div class="result-card">
                <p class="card-label">Accuracy</p>
                <p class="card-value accuracy">50</p>
            </div>
            <div class="result-card">
                <p class="card-label">Characters</p>
                <p class="card-value character">50</p>
            </div>
        </div>

        <button class="go-again">Go Again</button>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
