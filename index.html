<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="style.css" type="text/css" media="all" />
</head>
<body>
<header>
    <div>
        <img class="logo" src="./assets/images/logo-small.svg" alt="logo"/>
    </div>
    <div>
        <img class="" src="./assets/images/icon-personal-best.svg" alt="Cup icon"/>
        <p>Best: <span class="personal-best">PB</span> WPM</p>
    </div>
</header>
  
<div class="stats">
    <div>
        <p>WPM:</p>
        <span>40</span>
    </div>
    <div class="accuracy">
        <p>Accuracy:</p>
        <span>90%</span>
    </div>
    <div>
        <p>Time:</p>
        <span>0:10</span>
    </div>
</div>

<div class="option">
    <select name="difficulty" id="difficulty">
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
    </select>

    <select name="mode" id="mode">
        <option value="Timed">Timed (60s)</option>
        <option value="Passage">Passage</option>
    </select>
</div>
  <!-- Passage -->
<div class="passage">
    <p>
        The sun rose over the quiet town. Birds sang in the trees as people woke up and started their day. It was going to be a warm and sunny morning.
    </p>
</div>

<!--
  Test Complete!
  Solid run. Keep pushing to beat your high score.

  WPM: 
  Accuracy: 
  Characters:

  Go Again
  -->
  <script src="script.js"></script>
</body>
</html>
